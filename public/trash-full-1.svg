<?xml version="1.0" encoding="UTF-8" ?>
<svg version="1.1" width="24" height="22" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 22">
  <!-- Lid - straight rectangular lid (same as normal trash) -->
  <rect x="4" y="0" width="16" height="2" fill="#FFFFFF" stroke="#000000" stroke-width="0.5" rx="0.5"/>
  
  <!-- Main body - symmetrical bulge: both sides bulge outward equally -->
  <!-- Base rectangle: x=4 to x=20, y=2 to y=20 -->
  <!-- Left side bulges left, right side bulges right by equal amounts -->
  <!-- Maximum bulge at vertical center (y=11) -->
  <path d="M 4 2 
           L 2.5 3
           C 2 4.5, 1.5 7, 1.5 9.5
           C 1.5 10.25, 1.5 11, 1.5 11.75
           C 1.5 13.5, 2 16, 2.5 17.5
           L 4 19
           L 4 20
           L 20 20
           L 20 19
           L 21.5 17.5
           C 22 16, 22.5 13.5, 22.5 11.75
           C 22.5 11, 22.5 10.25, 22.5 9.5
           C 22.5 7, 22 4.5, 21.5 3
           L 20 2
           Z" fill="#FFFFFF" stroke="#000000" stroke-width="0.5"/>
  
  <!-- Vertical lines - symmetrical curves, bulging outward equally -->
  <!-- Left line: bulges left by 0.5 units at center (y=11) -->
  <path d="M 8 2 
           C 7.75 5.5, 7.5 8.5, 7.5 11
           C 7.5 13.5, 7.75 16.5, 8 20" 
        fill="none" stroke="#000000" stroke-width="0.5" stroke-linecap="round"/>
  
  <!-- Middle line: bulges left by 1 unit at center (mirrored on right side) -->
  <path d="M 12 2 
           C 11.5 5.5, 11 8.5, 11 11
           C 11 13.5, 11.5 16.5, 12 20" 
        fill="none" stroke="#000000" stroke-width="0.5" stroke-linecap="round"/>
  
  <!-- Right line: bulges right by 0.5 units at center (mirrored from left) -->
  <path d="M 16 2 
           C 16.25 5.5, 16.5 8.5, 16.5 11
           C 16.5 13.5, 16.25 16.5, 16 20" 
        fill="none" stroke="#000000" stroke-width="0.5" stroke-linecap="round"/>
</svg>
